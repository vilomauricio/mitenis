<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mi tenis — sistema de rendimiento</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --blue:       #5170ff;
  --blue-d:     #3a52d6;
  --yellow:     #f3fe76;
  --court:      #5170ff;
  --court-mid:  #3a52d6;
  --court-l:    #6d86ff;
  --ball:       #f3fe76;
  --bg:         #5170ff;
  --surf:       #ffffff;
  --surf2:      #eef0ff;
  --border:     rgba(81,112,255,0.14);
  --text:       #20223a;
  --muted:      #6b6f8a;
  --hint:       #a9adc4;
  /* Áreas — identidad única azul */
  --tec:        #5170ff; --tec-bg:#e7ebff;
  --tac:        #5170ff; --tac-bg:#e7ebff;
  --fis:        #5170ff; --fis-bg:#e7ebff;
  --men:        #5170ff; --men-bg:#e7ebff;
  /* Niveles (semáforo) — Plan de acción */
  --lv1:        #dc2626; --lv1-bg:#fde8e8;
  --lv2:        #e0a200; --lv2-bg:#fef3c7;
  --lv3:        #16a34a; --lv3-bg:#dcfce7;
  /* Rendimiento — foco (amarillo) -> fortaleza (azul) */
  --pf1:        #f3fe76; --pf1-bg:#fbffcf;
  --pf2:        #a9b6ff; --pf2-bg:#e7ebff;
  --pf3:        #5170ff; --pf3-bg:#e0e6ff;
  --n1:#ff8585; --n2:#f5ff80; --n3:#22b16c;
  --radius:     16px;
  --radius-sm:  10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* LANDING */
.landing{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden;}
.landing-bg{position:absolute;inset:0;background:var(--yellow);}
.court-lines{position:absolute;inset:0;opacity:1;}
.court-lines::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(81,112,255,0.10) 59px,rgba(81,112,255,0.10) 61px);}
.court-lines::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(81,112,255,0.10) 59px,rgba(81,112,255,0.10) 61px);}
.landing-content{position:relative;z-index:2;text-align:center;max-width:540px;width:100%;}
.logo-ball{margin:0 auto 1.4rem;display:flex;align-items:center;justify-content:center;}
.logo-ball svg{width:60px;height:104px;}
.landing-title{font-family:'Inter',sans-serif;font-size:clamp(36px,9vw,60px);font-weight:400;color:var(--blue);line-height:1.0;letter-spacing:-.03em;margin-bottom:8px;}
.landing-title span{font-weight:800;}
.landing-sub{font-size:14px;color:rgba(81,112,255,.8);margin-bottom:2.5rem;letter-spacing:.01em;}
.select-card{background:var(--surf);border:1px solid var(--border);border-radius:20px;padding:1.5rem;width:100%;box-shadow:0 10px 34px rgba(81,112,255,0.14);}
.select-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;text-align:left;}
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.player-btn{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;text-align:left;}
.player-btn:hover{background:var(--surf2);border-color:var(--blue);transform:translateY(-2px);}
.pb-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff;}
.pb-name{font-size:13px;font-weight:600;color:var(--text);}
.pb-meta{font-size:11px;color:var(--muted);}
.player-cat-head{grid-column:1/-1;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:14px 2px 2px;}
.player-cat-head:first-child{margin-top:0;}
.player-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.10);}
.player-cat-count{margin-left:auto;font-size:10px;font-weight:600;color:var(--hint);background:var(--surf2);border-radius:99px;padding:2px 8px;letter-spacing:0;text-transform:none;}
.loading-state{color:var(--muted);font-size:13px;padding:1rem;text-align:center;}

/* APP */
.app{display:none;min-height:100vh;flex-direction:column;}
.app.visible{display:flex;}

/* HEADER */
.app-header{background:var(--ball);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(32,34,58,.18);}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;}
.header-back{background:rgba(32,34,58,.07);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;color:rgba(32,34,58,.7);font-size:12px;font-family:'Inter',sans-serif;transition:background .15s;}
.header-back:hover{background:rgba(32,34,58,.13);}
.header-player{display:flex;align-items:center;gap:10px;}
.header-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.header-name{font-family:'Inter',sans-serif;font-size:19px;font-weight:800;color:var(--blue);letter-spacing:-.01em;}
.header-meta{font-size:11px;color:var(--muted);}
.app-tabs{display:flex;padding:10px 20px 0;overflow-x:auto;scrollbar-width:none;}
.app-tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:8px 16px;font-family:'Inter',sans-serif;font-size:13px;color:rgba(32,34,58,.5);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
.tab-btn:hover:not(.active){color:rgba(32,34,58,.8);}

/* CONTENT */
.app-content{flex:1;padding:20px 16px 48px;}
.tab-view{display:none;}
.tab-view.active{display:block;}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.card-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.card-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* FICHA */
.ficha-grid{display:flex;flex-wrap:wrap;gap:14px 24px;}
.ficha-item label{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:2px;}
.ficha-item span{font-size:14px;font-weight:500;color:var(--text);}

/* ÁREA CARDS — 4 áreas con colores distintos */
.area-card{border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid transparent;}
.area-tec{background:linear-gradient(135deg,#f0f5fc,#e5eef9);border-color:#c0d4ef;}
.area-tac{background:linear-gradient(135deg,#fef6ed,#fdeedd);border-color:#f0d0a0;}
.area-fis{background:linear-gradient(135deg,#edf7f0,#dff2e6);border-color:#b0dcc0;}
.area-men{background:linear-gradient(135deg,#f5f0fc,#ede4f9);border-color:#cdb8e8;}

.area-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.area-title-wrap{display:flex;align-items:center;gap:8px;}
.area-emoji{font-size:18px;}
.area-name{font-family:'Inter',sans-serif;font-size:16px;font-weight:700;}
.area-name.tec{color:var(--tec);}
.area-name.tac{color:var(--tac);}
.area-name.fis{color:var(--fis);}
.area-name.men{color:var(--men);}

/* PROMEDIO ÁREA */
.area-avg-wrap{text-align:right;}
.area-avg-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.nivel-badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:600;}
.n1{background:var(--lv1-bg);color:var(--lv1);}
.n2{background:var(--lv2-bg);color:var(--lv2);}
.n3{background:var(--lv3-bg);color:var(--lv3);}
.n0{background:var(--surf2);color:var(--hint);}

/* VARIABLE ROW */
.var-row{margin-bottom:11px;}
.var-row:last-child{margin-bottom:0;}
.var-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.var-name{font-size:12px;font-weight:500;color:var(--text);}
.var-pips{display:flex;gap:4px;}
.pip{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.pip-on1{background:var(--lv1);color:#fff;}
.pip-on2{background:var(--lv2);color:#fff;}
.pip-on3{background:var(--lv3);color:#fff;}
.pip-off{background:rgba(0,0,0,.08);color:var(--hint);}
.var-desc{font-size:11px;color:var(--muted);line-height:1.55;padding-left:10px;border-left:3px solid rgba(0,0,0,.08);}
.var-desc.d1{border-color:var(--lv1);}
.var-desc.d2{border-color:var(--lv2);}
.var-desc.d3{border-color:var(--lv3);}

/* BENCHMARK */
.bench-section{margin-top:13px;padding-top:11px;border-top:1px solid rgba(0,0,0,.07);}
.bench-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:9px;}
.bench-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bench-row:last-child{margin-bottom:0;}
.bench-lbl{font-size:11px;color:var(--text);width:90px;flex-shrink:0;}
.bench-bars{flex:1;}
.bbar{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.bbar:last-child{margin-bottom:0;}
.bbar-tag{font-size:9px;color:var(--muted);width:26px;flex-shrink:0;}
.bbar-track{flex:1;height:5px;background:rgba(0,0,0,.07);border-radius:99px;overflow:hidden;}
.bbar-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.34,1.2,.64,1);}
.bbar-val{font-size:9px;font-family:'Inter',sans-serif;color:var(--hint);width:34px;text-align:right;flex-shrink:0;}
.bench-diff{font-size:10px;font-family:'Inter',sans-serif;width:26px;text-align:right;flex-shrink:0;}

/* MÉTRICAS RESUMEN TOP */
.metrics-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.metric-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:13px;text-align:center;}
.metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.metric-icon{font-size:20px;margin-bottom:4px;}

/* BRECHA */
.brecha-card{background:linear-gradient(135deg,#fff8ed,#fffbf2);border:1px solid #f5d78a;border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.brecha-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#92520a;margin-bottom:10px;}
.brecha-item{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.brecha-item:last-child{margin-bottom:0;}
.brecha-name{font-size:12px;color:var(--text);width:100px;flex-shrink:0;}
.brecha-track{flex:1;display:flex;gap:3px;}
.brecha-seg{height:8px;border-radius:4px;}

/* CTX BADGE */
.ctx-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.ctx-libre{background:#dbeafe;color:#1d4ed8;}
.ctx-ejercicio{background:#ede9fe;color:#6d28d9;}
.ctx-partido{background:var(--lv2-bg);color:var(--lv2);}
.ctx-torneo{background:var(--lv1-bg);color:var(--lv1);}

/* HISTORIAL */
.session-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.session-item:last-child{border-bottom:none;padding-bottom:0;}
.session-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.session-date{font-size:11px;color:var(--hint);font-family:'Inter',sans-serif;}
.session-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.session-pill{font-size:10px;padding:2px 8px;border-radius:5px;font-family:'Inter',sans-serif;}
.pill-tec{background:var(--tec-bg);color:var(--tec);}
.pill-tac{background:var(--tac-bg);color:var(--tac);}
.pill-fis{background:var(--fis-bg);color:var(--fis);}
.pill-men{background:var(--men-bg);color:var(--men);}

/* FEEDBACK */
.feedback-block{background:var(--surf2);border-left:3px solid var(--court-l);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 13px;font-size:12px;color:var(--text);line-height:1.6;margin-top:8px;}
.feedback-coach{border-color:var(--ball);}

/* PROGRESO */
.chart-wrap{position:relative;width:100%;height:220px;}

/* NOTA */
.nota{background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;font-size:12px;color:var(--text);margin-bottom:14px;line-height:1.55;}

/* EMPTY / SPINNER */
.empty{text-align:center;padding:2rem;color:rgba(255,255,255,.9);font-size:13px;}
.spinner{width:30px;height:30px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:2rem auto;}
.loading-view{text-align:center;padding:3rem 1rem;}
.loading-view p{font-size:13px;color:rgba(255,255,255,.85);margin-top:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* RÚBRICA TAB */
.rubrica-section{margin-bottom:18px;}
.rubrica-header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.rubrica-row{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:8px;}
.rubrica-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.rubrica-name{font-size:13px;font-weight:500;color:var(--text);}
.rubrica-nivel{display:flex;gap:6px;}
.nivel-pip{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .2s;}
.nivel-pip.active-1{background:var(--lv1);color:#fff;}
.nivel-pip.active-2{background:var(--lv2);color:#fff;}
.nivel-pip.active-3{background:var(--lv3);color:#fff;}
.nivel-pip.inactive{background:var(--surf2);color:var(--hint);}
.rubrica-desc{font-size:11px;color:var(--muted);line-height:1.55;border-left:3px solid var(--surf2);padding-left:10px;}
.rubrica-desc.lv1{border-color:var(--lv1);}
.rubrica-desc.lv2{border-color:var(--lv2);}
.rubrica-desc.lv3{border-color:var(--lv3);}

@media(min-width:480px){.metrics-row{grid-template-columns:repeat(4,1fr);}.app-content{padding:24px 24px 48px;}}
@media(min-width:700px){.player-grid{grid-template-columns:repeat(3,1fr);}}

/* TENDENCIA */
.trend{font-size:10px;font-family:'Inter',sans-serif;margin-top:4px;display:inline-block;font-weight:500;}
.trend.up{color:var(--lv3);}
.trend.down{color:var(--lv1);}
.trend.flat{color:var(--hint);}

/* PLAN DE ACCIÓN */
.plan-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.plan-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:11px;flex-wrap:wrap;}
.plan-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:7px;}
.plan-step{margin-bottom:9px;}
.plan-step:last-child{margin-bottom:0;}
.plan-step-lbl{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);margin-bottom:4px;}
.plan-meta-lbl{color:var(--fis);}
.plan-now{font-size:12px;color:var(--muted);line-height:1.55;border-left:3px solid var(--lv1);padding-left:10px;}
.plan-now.now2{border-color:var(--lv2);}
.plan-meta{font-size:12px;color:var(--text);line-height:1.55;border-left:3px solid var(--lv3);padding-left:10px;font-weight:500;}
.plan-group-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:20px 0 11px;display:flex;align-items:center;gap:8px;}
.plan-group-title::after{content:'';flex:1;height:1px;background:var(--border);}
.plan-arma{display:inline-flex;align-items:center;gap:5px;background:var(--lv3-bg);color:var(--lv3);padding:6px 11px;border-radius:8px;font-size:12px;font-weight:500;margin:0 6px 6px 0;}
.plan-armas-wrap{display:flex;flex-wrap:wrap;}

/* ERROR INLINE */
.err-box{background:var(--lv1-bg);border:1px solid var(--lv1);border-radius:var(--radius-sm);padding:12px 14px;color:var(--lv1);font-size:13px;line-height:1.5;}
.err-box strong{display:block;margin-bottom:3px;}

/* SEMÁFORO / NIVEL (lenguaje único) */
.nivel-dot{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;}
.nivel-dot .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;display:inline-block;}
.dot-1{background:var(--lv1);} .dot-2{background:var(--lv2);} .dot-3{background:var(--lv3);} .dot-0{background:var(--hint);}
.nivel-dot.t1{color:var(--lv1);} .nivel-dot.t2{color:var(--lv2);} .nivel-dot.t3{color:var(--lv3);} .nivel-dot.t0{color:var(--hint);}

/* DELTA vs categoría */
.delta{font-size:10px;font-family:'Inter',sans-serif;font-weight:500;padding:1px 6px;border-radius:5px;}
.delta.pos{color:var(--lv3);background:var(--lv3-bg);}
.delta.neg{color:var(--lv1);background:var(--lv1-bg);}
.delta.eq{color:var(--hint);background:var(--surf2);}

/* FILA DE HABILIDAD AGRUPADA (Resumen) */
.skill-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.skill-row:last-child{border-bottom:none;padding-bottom:0;}
.skill-name{font-size:13px;font-weight:500;color:var(--text);}
.skill-right{display:flex;align-items:center;gap:9px;}

/* ACORDEÓN (Rendimiento) */
.acc{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.acc-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.acc-head:hover{background:var(--surf2);}
.acc-title{display:flex;align-items:center;gap:9px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;}
.acc-right{display:flex;align-items:center;gap:12px;}
.acc-chevron{transition:transform .25s;color:var(--muted);font-size:13px;}
.acc.open .acc-chevron{transform:rotate(180deg);}
.acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.acc.open .acc-body{max-height:3000px;}
.acc-body-inner{padding:2px 16px 14px;}

/* SEMÁFORO (Plan) */
.sem-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.sem-leg{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;}
.sem-group{margin-bottom:16px;}
.sem-group-h{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:9px;}
.sem-group-h .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
.sem-item{display:flex;align-items:center;gap:11px;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:7px;}
.sem-item .dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;display:inline-block;}
.sem-item-name{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.sem-item-area{font-size:10px;color:var(--muted);white-space:nowrap;}


/* === v5: Inter, paleta reducida, cards blancas === */
.ficha-grid{gap:16px 28px;}
.ficha-item span{font-size:15px;}

/* Filtro por mes */
.month-filter{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.mf-chip{font-size:13px;font-weight:500;padding:8px 16px;border-radius:999px;border:1px solid var(--border);background:var(--surf);color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.mf-chip:hover{border-color:var(--court-l);color:var(--text);}
.mf-chip.active{background:var(--court);color:#fff;border-color:var(--court);}

/* Cards de métrica (Resumen) */
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
.metric-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:left;}
.mc-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.mc-value{font-size:30px;font-weight:700;line-height:1;color:var(--text);letter-spacing:-.01em;}
.mc-delta{font-size:12px;font-weight:500;margin-top:9px;}
.mc-delta.up{color:var(--lv3);} .mc-delta.down{color:var(--lv1);} .mc-delta.flat{color:var(--hint);}
.mc-cat{font-size:12px;color:var(--hint);margin-top:4px;}

/* dot de categoría */
.cat-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:7px;vertical-align:middle;}

/* Rendimiento — barras */
.perf-grid{display:grid;grid-template-columns:1fr;gap:14px;}
.perf-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.perf-card-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.perf-row{margin-bottom:16px;}
.perf-row:last-child{margin-bottom:0;}
.perf-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px;}
.perf-name{font-size:13px;font-weight:500;color:var(--text);}
.perf-val{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.perf-delta{font-size:11px;font-weight:600;}
.perf-delta.pos{color:var(--lv3);} .perf-delta.neg{color:var(--lv1);} .perf-delta.eq{color:var(--hint);}
.perf-track{position:relative;height:8px;background:var(--surf2);border-radius:999px;}
.perf-fill{height:100%;border-radius:999px;transition:width .6s cubic-bezier(.34,1.2,.64,1);}
.fill-1{background:var(--pf1);} .fill-2{background:var(--pf2);} .fill-3{background:var(--pf3);} .fill-0{background:var(--hint);}
.perf-tick{position:absolute;top:-3px;width:2px;height:14px;background:var(--text);opacity:.5;border-radius:2px;}
.perf-cat{font-size:11px;color:var(--hint);margin-top:7px;}
@media(min-width:760px){.perf-grid{grid-template-columns:1fr 1fr;}}


/* === mi tenis: ajustes de marca === */
.radar-wrap{background:transparent;border:none;margin-bottom:16px;padding:2px 0 8px;}
.mc-delta.down{color:var(--muted);}
.perf-delta.neg{color:var(--muted);}
.perf-tick{background:var(--blue-d);opacity:.75;}
.cat-dot{box-shadow:0 0 0 2px rgba(255,255,255,.7);}


/* === v7: dot base, deltas on-brand, última actualización, modal PIN === */
.dot{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:middle;}
.mc-delta.up{color:var(--pf3);}
.perf-delta.pos{color:var(--pf3);}
.last-update{margin-top:14px;font-size:11px;color:var(--muted);text-align:center;}
.pin-overlay{position:fixed;inset:0;background:rgba(32,34,58,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:1000;padding:1.5rem;}
.pin-overlay.show{display:flex;}
.pin-modal{background:var(--surf);border-radius:var(--radius);padding:24px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(32,34,58,.3);}
.pin-title{font-weight:700;font-size:17px;color:var(--text);margin-bottom:4px;}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}
.pin-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:18px;font-family:'Inter',sans-serif;letter-spacing:.2em;text-align:center;color:var(--text);outline:none;}
.pin-input:focus{border-color:var(--blue);}
.pin-err{font-size:12px;color:var(--lv1);min-height:16px;margin-top:8px;}
.pin-actions{display:flex;gap:10px;margin-top:16px;}
.pin-btn{flex:1;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;}
.pin-cancel{background:var(--surf2);color:var(--text);}
.pin-ok{background:var(--blue);color:#fff;}


/* === v8: pelotas Rendimiento + checklist Plan === */
.ball{display:inline-block;width:16px;height:16px;border-radius:50%;margin-right:5px;border:1px solid rgba(32,34,58,.10);}
.ball:last-child{margin-right:0;}
.be{background:#eef0f7;}
.bf1{background:#9aa0b4;border-color:#9aa0b4;}
.bf2{background:#5170ff;border-color:#5170ff;}
.bf3{background:#f3fe76;border-color:#d9e84a;}
.ball-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.ball-name{font-size:13px;font-weight:500;color:var(--text);}
.ball-right{display:flex;align-items:center;gap:10px;}
.balls{display:inline-flex;align-items:center;}
.ball-label{font-size:12px;font-weight:600;min-width:84px;text-align:right;}
.lb1{color:var(--muted);} .lb2{color:var(--blue);} .lb3{color:#8a7e00;}
.ball-cat{font-size:10px;color:var(--hint);margin:-2px 0 8px;}

/* Checklist de prioridad (Plan) */
.prio-row{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);border-left:3px solid transparent;margin-bottom:7px;background:var(--surf);cursor:pointer;}
.prio-row.lv1{border-left-color:var(--lv1);}
.prio-row.lv2{border-left-color:var(--lv2);}
.prio-check{width:18px;height:18px;accent-color:var(--blue);flex-shrink:0;cursor:pointer;}
.prio-name{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.prio-area{font-size:10px;color:var(--muted);white-space:nowrap;}
.prio-row.is-prio{background:var(--pf1-bg);border-color:#e7e08a;}

/* ══════ LIGA / PUNTOS ══════ */
.lg-mode{display:flex;gap:6px;background:var(--surf2);border:1px solid var(--border);border-radius:999px;padding:4px;margin-bottom:12px;}
.lg-mode button{flex:1;border:none;background:none;padding:8px 10px;border-radius:999px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.lg-mode button.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(81,112,255,.3);}
.lg-period{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;padding-bottom:2px;}
.lg-period::-webkit-scrollbar{display:none;}
.lg-chip{flex-shrink:0;border:1px solid var(--border);background:var(--surf);border-radius:999px;padding:6px 13px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.lg-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* Tarjeta MI PUNTAJE */
.lg-me{background:linear-gradient(135deg,var(--blue),var(--blue-d));border-radius:var(--radius);padding:18px;margin-bottom:16px;color:#fff;box-shadow:0 10px 30px rgba(81,112,255,.28);}
.lg-me-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.lg-me-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.8;margin-bottom:2px;}
.lg-me-rank{font-size:15px;font-weight:700;}
.lg-me-score{text-align:right;}
.lg-me-pts{font-size:38px;font-weight:800;line-height:1;}
.lg-me-pts span{font-size:14px;font-weight:600;opacity:.75;}
.lg-break{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.lg-break-3{grid-template-columns:repeat(3,1fr);}
.lg-break-5{grid-template-columns:repeat(5,1fr);gap:5px;}
.lg-break-5 .lg-bk{padding:8px 3px;}
.lg-break-5 .lg-bk-lbl{font-size:8px;}
.lg-bk{background:rgba(255,255,255,.13);border-radius:10px;padding:9px 6px;text-align:center;}
.lg-bk-ico{font-size:15px;line-height:1;}
.lg-bk-val{font-size:16px;font-weight:800;margin-top:3px;}
.lg-bk-lbl{font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;opacity:.78;margin-top:1px;}

/* Podio */
.lg-podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:6px 0 18px;}
.lg-pod{flex:1;max-width:104px;text-align:center;}
.lg-pod-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;margin:0 auto 6px;border:3px solid var(--surf);box-shadow:0 4px 10px rgba(32,34,58,.18);}
.lg-pod-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lg-pod-pts{font-size:12px;font-weight:800;color:var(--blue);}
.lg-pod-stand{border-radius:10px 10px 0 0;margin-top:7px;display:flex;align-items:flex-start;justify-content:center;padding-top:7px;font-size:18px;font-weight:800;color:#fff;}
.lg-pod.p1 .lg-pod-stand{background:linear-gradient(180deg,#f3c64b,#e0a200);height:74px;}
.lg-pod.p2 .lg-pod-stand{background:linear-gradient(180deg,#c7cdda,#9aa3b8);height:56px;}
.lg-pod.p3 .lg-pod-stand{background:linear-gradient(180deg,#d8a06b,#b97f47);height:42px;}
.lg-pod.p1 .lg-pod-av{width:54px;height:54px;font-size:16px;}

/* Tabla de posiciones */
.lg-row{display:flex;align-items:center;gap:11px;padding:10px 8px;border-bottom:1px solid var(--border);}
.lg-row:last-child{border-bottom:none;}
.lg-row.me{background:var(--pf1-bg);border-radius:10px;border-bottom:1px solid transparent;}
.lg-rank{width:24px;text-align:center;font-size:14px;font-weight:800;color:var(--muted);flex-shrink:0;}
.lg-rank.top{color:var(--blue);}
.lg-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.lg-info{flex:1;min-width:0;}
.lg-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lg-sub{font-size:10.5px;color:var(--muted);margin-top:1px;}
.lg-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:5px;vertical-align:middle;}
.lg-badge.improve{background:var(--pf1);color:#5b5400;}
.lg-pts{font-size:17px;font-weight:800;color:var(--text);flex-shrink:0;}
.lg-pts span{font-size:10px;font-weight:600;color:var(--hint);}

/* Medallas por área */
.lg-medals{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.lg-medal{display:flex;align-items:center;gap:9px;border:1px solid var(--border);border-radius:12px;padding:10px 11px;background:var(--surf);}
.lg-medal-ic{font-size:22px;line-height:1;}
.lg-medal-tx{min-width:0;}
.lg-medal-area{font-size:12px;font-weight:600;color:var(--text);}
.lg-medal-tier{font-size:10.5px;color:var(--muted);}
.lg-medal.none{opacity:.55;}


/* === v9: deltas color, pelota-categoría sin choque, foto de perfil === */
.mc-delta.up{color:var(--lv3);}
.mc-delta.down{color:var(--lv1);}
.mc-delta.flat{color:var(--muted);}

.ball-item{padding:10px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.ball-item:last-child{border-bottom:none;padding-bottom:0;}
.ball-row{border-bottom:none;padding:0;}
.ball-cat{margin:6px 0 0;font-size:11px;color:var(--muted);}

/* Avatares con aspecto de pelota (brillo) */
.header-avatar,.pb-avatar,.lg-av,.lg-pod-av{box-shadow:inset 0 3px 6px rgba(255,255,255,.32),inset 0 -4px 8px rgba(0,0,0,.16);}

/* Selector de foto de perfil (pelotas) */
.av-picker{display:flex;gap:11px;flex-wrap:wrap;}
.av-pick{width:36px;height:36px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;overflow:hidden;box-shadow:inset 0 2px 6px rgba(255,255,255,.45),inset 0 -3px 6px rgba(0,0,0,.14);transition:transform .12s;}
.av-pick:hover{transform:translateY(-2px);}
.av-pick::after{content:'';position:absolute;left:-22%;right:-22%;top:17%;height:66%;border:2px solid rgba(255,255,255,.6);border-top:none;border-bottom:none;border-radius:50%;pointer-events:none;}
.av-pick.active{border-color:var(--blue);box-shadow:0 0 0 3px rgba(81,112,255,.25),inset 0 2px 6px rgba(255,255,255,.45);}


/* === v10: avatar clickeable === */
.header-avatar{transition:outline .12s;}

/* === v12: card de asistencia === */
.asist-row{display:flex;align-items:center;gap:16px;}
.asist-pct{font-size:34px;font-weight:800;line-height:1;}
.asist-pct.ok{color:var(--lv3);}
.asist-pct.low{color:var(--lv2);}
.asist-meta{flex:1;min-width:0;}
.asist-bar{height:10px;background:var(--surf2);border-radius:999px;overflow:hidden;margin-bottom:6px;}
.asist-fill{height:100%;border-radius:999px;background:var(--lv3);transition:width .6s cubic-bezier(.34,1.2,.64,1);}
.asist-fill.low{background:var(--lv2);}
.asist-txt{font-size:12px;color:var(--muted);}

/* === v13: sufijo "/ 3" en el score === */
.mc-max{font-size:0.56em;font-weight:600;color:var(--hint);letter-spacing:0;}

/* === v14: pulgares + botón info Liga === */
.balls{display:inline-flex;align-items:center;gap:3px;}
.thumb{font-size:18px;line-height:1;}
.thumb.off{opacity:.22;filter:grayscale(1);}
.lg-info-btn{background:var(--surf);border:1px solid var(--border);border-radius:999px;padding:8px 15px;font-size:12px;font-weight:600;color:var(--blue);font-family:'Inter',sans-serif;cursor:pointer;margin-bottom:14px;transition:background .15s;}
.lg-info-btn:hover{background:var(--surf2);}

/* === v14: Modo Profe === */
.coach{display:none;min-height:100vh;flex-direction:column;}
.coach.visible{display:flex;}
.coach-btn{margin-top:16px;width:100%;background:transparent;border:1.5px solid var(--blue);color:var(--blue);border-radius:12px;padding:12px 18px;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;}
.coach-btn:hover{background:var(--blue);color:#fff;}
.cz-h{color:#fff;font-weight:700;font-size:14px;margin:4px 2px 10px;}
.cz-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);}
.cz-row:last-child{border-bottom:none;}
.cz-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;box-shadow:inset 0 3px 6px rgba(255,255,255,.32),inset 0 -4px 8px rgba(0,0,0,.16);}
.cz-info{flex:1;min-width:0;}
.cz-name{font-size:13px;font-weight:600;color:var(--text);}
.cz-sub{font-size:10.5px;color:var(--muted);margin-top:2px;}
.cz-right{text-align:right;flex-shrink:0;}
.cz-score{font-size:16px;font-weight:800;color:var(--text);}
.cz-score span{font-size:10px;color:var(--hint);font-weight:600;}
.cz-at{font-size:10px;font-weight:600;margin-top:2px;}
.cz-at.ok{color:var(--lv3);} .cz-at.low{color:var(--lv2);}

/* === v15: paleta de niveles (chip fondo + texto negro) === */
.ball-label{padding:4px 12px;border-radius:999px;color:#161616!important;font-weight:700;text-align:center;min-width:0;}
.lb1{background:var(--n1);} .lb2{background:var(--n2);} .lb3{background:var(--n3);}
.dot-1{background:var(--n1);} .dot-2{background:var(--n2);} .dot-3{background:var(--n3);}
.prio-row.lv1{border-left-color:var(--n1);}
.prio-row.lv2{border-left-color:var(--n2);}

/* === v16: columna de pulgares alineada === */
.ball-row{justify-content:flex-start;}
.ball-name{flex:1;}
.balls{width:70px;justify-content:flex-start;flex-shrink:0;}
.ball-label{width:104px;flex-shrink:0;text-align:center;}

/* === v17: logo emoji + indicador de suba === */
.logo-emoji{font-size:104px;line-height:1;}
.rise-tag{display:inline-block;font-size:11px;font-weight:700;color:#136c34;background:#dcfce7;padding:3px 10px;border-radius:999px;margin-top:7px;}

/* === v18: Modo Profe (highlight + ranking compacto) === */
.mc-hl{background:#f5ff80;border-color:#e6ef5e;}
.cz-row{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--border);}
.cz-name{font-size:14px;font-weight:600;color:var(--text);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cz-score{font-size:23px;font-weight:800;color:var(--text);line-height:1;}
.cz-score span{font-size:11px;color:var(--hint);font-weight:600;}
.cz-at{margin-left:auto;font-size:16px;font-weight:800;}
.cz-at.ok{color:var(--lv3);} .cz-at.low{color:var(--lv2);}

/* === v19: Modo Profe radar + ranking compacto === */
.cz-bottom{display:grid;grid-template-columns:1fr;gap:16px;align-items:start;}
@media(min-width:760px){.cz-bottom{grid-template-columns:1fr 1fr;}}
.cz-ind{margin-left:auto;display:flex;flex-direction:column;gap:4px;}
.cz-ind-row{display:flex;align-items:baseline;justify-content:flex-end;gap:8px;}
.cz-ind-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.cz-ind-val{font-size:18px;font-weight:800;color:var(--text);line-height:1;}
.cz-ind-val span{font-size:10px;color:var(--hint);font-weight:600;}
.cz-ind-val.ok{color:var(--lv3);} .cz-ind-val.low{color:var(--lv2);}

/* === v22: pregunta-guía por variable === */
.ball-q{font-size:11px;color:var(--muted);margin-top:3px;font-style:italic;}

/* === v23: Rendimiento masonry (cards parejas) === */
.perf-grid{display:block;}
.perf-card{break-inside:avoid;-webkit-column-break-inside:avoid;margin-bottom:16px;}
@media(min-width:760px){.perf-grid{column-count:2;column-gap:16px;}}

/* === v25: Modo Profe (intro, filtros 2col, asistencia, ranking número) === */
.cz-intro{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;}
.cz-intro-t{font-weight:800;font-size:16px;color:var(--blue);margin-bottom:6px;}
.cz-intro-d{font-size:13px;color:var(--text);line-height:1.55;}
.cz-filters{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px;}
.cz-filters .card{margin:0;}
.cz-asist{display:flex;gap:14px;}
.cz-stat{flex:1;background:var(--surf2);border-radius:var(--radius-sm);padding:12px;text-align:center;}
.cz-stat-val{font-size:26px;font-weight:800;color:var(--text);line-height:1;}
.cz-stat-val span{font-size:12px;color:var(--hint);font-weight:600;}
.cz-stat-lbl{font-size:11px;color:var(--muted);margin-top:5px;}
.cz-rank{font-size:15px;font-weight:800;color:var(--muted);width:20px;text-align:center;flex-shrink:0;}

/* === v27: tooltips KPI + historial obs + ranking asist menor === */
.mc-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
.mc-head .mc-label{margin-bottom:0;}
.mc-info{position:relative;display:inline-block;}
.mc-info-btn{width:18px;height:18px;border-radius:50%;border:1px solid var(--border);background:var(--surf2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;padding:0;line-height:16px;font-family:'Inter',sans-serif;}
.mc-info-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
.mc-tip{position:absolute;top:calc(100% + 6px);right:0;background:#20223a;color:#fff;font-size:11px;font-weight:500;padding:9px 11px;border-radius:8px;width:max-content;max-width:240px;box-shadow:0 10px 26px rgba(32,34,58,.32);opacity:0;pointer-events:none;transform:translateY(-4px);transition:all .15s;z-index:60;line-height:1.45;text-align:left;}
.mc-info:hover .mc-tip,.mc-info.open .mc-tip{opacity:1;pointer-events:auto;transform:translateY(0);}
.cz-ind-val-sm{font-size:13px;}
.hist-obs-h{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:8px;margin-bottom:3px;}

/* === v28: filtros acordeón compacto + dot categoría grande === */
.filter-acc{margin-bottom:10px;}
.filter-acc .acc-head{padding:10px 14px;}
.filter-acc .acc-title{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--text);display:inline-flex;align-items:center;gap:4px;}
.filter-acc .acc-sub{font-size:12px;font-weight:500;color:var(--muted);margin-left:4px;}
.filter-acc .acc-body-inner{padding:0 14px 12px;}

<!-- LANDING -->
<div class="landing" id="landing">
  <div class="landing-bg"></div>

async function fetchSheet(name){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(), 15000);
  let res;
  try{
    res=await fetch(url,{signal:ctrl.signal});
  }catch(e){
    throw new Error(e.name==='AbortError' ? `Tiempo de espera agotado al cargar "${name}"` : `Error de red al cargar "${name}"`);
  }finally{
    clearTimeout(timer);
  }
  if(!res.ok) throw new Error(`No se pudo cargar la hoja "${name}" (HTTP ${res.status})`);
  return parseCSV(await res.text());
}

// Parser CSV robusto: respeta comillas, comas y saltos de línea dentro de celdas,
// y comillas dobles escapadas (""). Devuelve TODAS las filas, incluida la cabecera.
function parseCSV(text){
  const s=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const rows=[]; let row=[], cur='', inQ=false;
  for(let i=0;i<s.length;i++){
    const ch=s[i];
    if(inQ){
      if(ch==='"'){ if(s[i+1]==='"'){cur+='"'; i++;} else inQ=false; }
      else cur+=ch;
    }else{
      if(ch==='"') inQ=true;
      else if(ch===','){ row.push(cur); cur=''; }
      else if(ch==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else cur+=ch;
    }
  }
  if(cur.length || row.length){ row.push(cur); rows.push(row); }
  return rows.map(r=>r.map(x=>x.trim()));
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function n(v){ return parseFloat((v+'').replace(',','.'))||0; }

// Normaliza encabezados para comparar (sin acentos, sin separadores, minúsculas)
function normHeader(s){
  return (s||'').toString().toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9]/g,'');
}
// Mapea claves lógicas a índice de columna por nombre de encabezado; si no encuentra, usa el índice por defecto
function buildColMap(headerRow, defaults, aliases){
  const map={...defaults};
  const norm=(headerRow||[]).map(normHeader);
  for(const key of Object.keys(defaults)){
    const wanted=(aliases&&aliases[key])||[];
    for(const a of wanted){
      const idx=norm.indexOf(normHeader(a));
      if(idx>=0){ map[key]=idx; break; }
    }
  }
  return map;
}
// Flecha de tendencia: compara promedio de la última vs la sesión anterior
function trendArrow(d){
  if(d===null||d===undefined) return '';
  if(d>0.05)  return `<span class="trend up" title="Mejoró vs sesión anterior">▲ ${d.toFixed(1)}</span>`;
  if(d<-0.05) return `<span class="trend down" title="Bajó vs sesión anterior">▼ ${Math.abs(d).toFixed(1)}</span>`;
  return `<span class="trend flat" title="Sin cambios vs sesión anterior">＝ igual</span>`;
}

// Convierte valor 1–3 directo (del forms) → nivel 1–3
// Si el forms ya entrega 1, 2 o 3 usamos directo.
// Si alguien cargó 1–10 por error, lo convertimos igual.
function toLvl(v){
  const x=n(v);
  if(x<=0) return 0;
  if(x===1) return 1;
  if(x===2) return 2;
  if(x===3) return 3;
  // Fallback para valores 1-10
  if(x<=3) return 1;
  if(x<=6) return 2;
  return 3;
}

function lvlLabel(l){ return l===3?'Excelente':l===2?'Funciona':l===1?'A trabajar':'—'; }

function lvlColor(l){ return l===3?'var(--lv3)':l===2?'var(--lv2)':l===1?'var(--lv1)':'var(--hint)'; }

function parseDate(s){
  if(!s) return null;
  // Google Forms: "dd/mm/yyyy hh:mm:ss" o "dd/mm/yyyy"
  const fecha = s.split(' ')[0];
  const p = fecha.split('/');
  if(p.length===3) return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  return fecha;
}
function fmtDate(s){
  const d=new Date(parseDate(s)+'T12:00:00');
  return isNaN(d)?s:d.toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'});
}

  return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
}

    r[INFO.categoria]?.trim().toLowerCase()===myCat
  );
  if(!peers.length) return null;
  const result={cat:myInfo[INFO.categoria], n:peers.length};
  const allKeys=[...AREA_KEYS.tecnica,...AREA_KEYS.tactica,...AREA_KEYS.fisico,...AREA_KEYS.mental];
  for(const key of allKeys){
    const lvls=[];
    peers.forEach(p=>{
      const pName=p[INFO.alumno]?.trim();
      const pSess=allRows.filter(r=>r[COL.alumno]===pName)
        .sort((a,b)=>new Date(parseDate(a[COL.fecha]))-new Date(parseDate(b[COL.fecha])));
      if(!pSess.length) return;
      const lv=toLvl(pSess[pSess.length-1][COL[key]]);
      if(lv>0) lvls.push(lv);
    });
    result[key]=lvls.length? lvls.reduce((a,b)=>a+b,0)/lvls.length : 0;
  }
  // Promedios por área
  for(const ak of Object.keys(AREA_KEYS)){
    const vals=AREA_KEYS[ak].map(k=>result[k]||0).filter(v=>v>0);
    result['avg_'+ak]=vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  }
  return result;
}

const CACHE_KEY='mitenis_cache_v1';
function fmtUpdated(ts){ const d=new Date(ts); return isNaN(d)?'':d.toLocaleString('es-AR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
function setUpdated(ts){ const e=document.getElementById('last-update'); if(e) e.textContent = ts ? ('Última actualización: '+fmtUpdated(ts)) : ''; }
function applyData(dataMatrix, infoMatrix, asistMatrix){
  if(dataMatrix.length) COL  = buildColMap(dataMatrix[0], COL_DEFAULT,  HEADER_ALIASES);
  if(infoMatrix && infoMatrix.length) INFO = buildColMap(infoMatrix[0], INFO_DEFAULT, INFO_ALIASES);
  if(asistMatrix && asistMatrix.length) ASIST = buildColMap(asistMatrix[0], ASIST_DEFAULT, ASIST_ALIASES);
  allRows  = dataMatrix.slice(1).filter(r=>r[COL.alumno] && r[COL.alumno].length>0);
  infoRows = (infoMatrix && infoMatrix.length) ? infoMatrix.slice(1).filter(r=>r[INFO.alumno] && r[INFO.alumno].length>0) : [];
  asistRows = (asistMatrix && asistMatrix.length) ? asistMatrix.slice(1).filter(r=>r[ASIST.jugador] && r[ASIST.jugador].length>0) : [];
}
function renderPlayers(){
  const players=[...new Set(allRows.map(r=>r[COL.alumno]))].filter(Boolean);
  const grid=document.getElementById('player-grid');
  if(!grid) return;
  if(!players.length){ grid.innerHTML='<div class="loading-state">No hay jugadores cargados.</div>'; return; }
  const catOf=p=>{ const i=getInfo(p); return i?(i[INFO.categoria]||'').trim():''; };
  const SIN='Sin categoría';
  // Agrupar por categoría
  const groups={};
  players.forEach(p=>{ const c=catOf(p)||SIN; (groups[c]=groups[c]||[]).push(p); });
  // Categorías en orden alfabético; "Sin categoría" siempre al final
  const cats=Object.keys(groups).sort((a,b)=>{
    if(a===SIN) return 1; if(b===SIN) return -1;
    return a.localeCompare(b,'es',{sensitivity:'base',numeric:true});
  });
  const btn=name=>{
    const ini=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const color=avatarColor(name);
    const ns=allRows.filter(r=>r[COL.alumno]===name).length;
    return `<button class="player-btn" onclick="selectPlayer('${name.replace(/'/g,"\\'")}')">
      <div class="pb-avatar" style="background:${color};">${ini}</div>
      <div><div class="pb-name">${name}</div><div class="pb-meta">${ns} sesión${ns!==1?'es':''}</div></div>
    </button>`;
  };
  grid.innerHTML=cats.map(c=>{
    const list=groups[c].slice().sort((a,b)=>a.localeCompare(b,'es',{sensitivity:'base',numeric:true}));
    const dotColor = c===SIN ? 'var(--hint)' : catColor(c);
    const head=`<div class="player-cat-head"><span class="player-cat-dot" style="background:${dotColor};"></span>${c}<span class="player-cat-count">${list.length}</span></div>`;
    return head + list.map(btn).join('');
  }).join('');
}
async function init(){
  if(window.Chart){ Chart.defaults.font.family="'Inter', sans-serif"; Chart.defaults.color='#6b6f8a'; }
  // 1) Cache para pintado instantáneo
  try{
    const raw=localStorage.getItem(CACHE_KEY);
    if(raw){ const cc=JSON.parse(raw); if(cc && cc.data){ applyData(cc.data, cc.info||[], cc.asist||[]); renderPlayers(); setUpdated(cc.ts); } }
  }catch(e){}
  // 2) Refresco en vivo desde el Sheet
  try{
    const [dataMatrix, infoMatrix, asistMatrix] = await Promise.all([
      fetchSheet(DATA_SHEET),
      fetchSheet(INFO_SHEET).catch(()=>[]),
      fetchSheet(ASIST_SHEET).catch(()=>[])
    ]);
    applyData(dataMatrix, infoMatrix, asistMatrix);
    renderPlayers();
    const ts=Date.now(); setUpdated(ts);
    try{ localStorage.setItem(CACHE_KEY, JSON.stringify({ts, data:dataMatrix, info:infoMatrix, asist:asistMatrix})); }catch(e){}
  }catch(e){
    if(!allRows.length){
      const g=document.getElementById('player-grid');
      if(g) g.innerHTML=`<div class="loading-state" style="color:#ffdddd;">Error: ${e.message}</div>`;
    }
  }
}

    <button class="mf-chip ${selectedMonth==='all'?'active':''}" onclick="setMonthCoach('all')">Todos</button>
    ${allMonths.map(m=>`<button class="mf-chip ${selectedMonth===m?'active':''}" onclick="setMonthCoach('${m}')">${mLabelFull(m)}</button>`).join('')}
  </div></div></div></div>`;
  const catChips = cats.length?`<div class="acc filter-acc"><div class="acc-head" onclick="toggleAcc(this)"><span class="acc-title">🏷️ Filtrar por categoría <span class="acc-sub">· ${coachCat==='all'?'Todas':coachCat}</span></span><span class="acc-chevron">▾</span></div><div class="acc-body"><div class="acc-body-inner"><div class="month-filter">
    <button class="mf-chip ${coachCat==='all'?'active':''}" onclick="setCatCoach('all')">Todas</button>
    ${cats.map(ct=>`<button class="mf-chip ${coachCat===ct?'active':''}" onclick="setCatCoach('${ct.replace(/'/g,"\\'")}')">${ct}</button>`).join('')}
  </div></div></div></div>`:'';

  const areas=['tecnica','tactica','fisico','mental'];

  const ctv=areas.map(a=>cAvg[a]).filter(v=>v>0); const cTot=ctv.length?ctv.reduce((x,y)=>x+y,0)/ctv.length:0;

    areas.forEach(a=>{ const v=pd.map(d=>d.av[a]).filter(x=>x>0); pAvg[a]=v.length?v.reduce((x,y)=>x+y,0)/v.length:0; });

  }
  const dPts=(cur,prev)=>{ if(!prevMonth||cur<=0||prev<=0) return '<div class="mc-delta flat">—</div>'; const d=cur-prev; if(d>=0.05) return `<div class="mc-delta up">↑ +${d.toFixed(1)}</div>`; if(d<=-0.05) return `<div class="mc-delta down">↓ ${d.toFixed(1)}</div>`; return '<div class="mc-delta flat">= igual</div>'; };
  const dCount=(cur,prev)=>{ if(!prevMonth) return '<div class="mc-delta flat">—</div>'; const d=cur-prev; if(d>0) return `<div class="mc-delta up">↑ +${d}</div>`; if(d<0) return `<div class="mc-delta down">↓ ${d}</div>`; return '<div class="mc-delta flat">= igual</div>'; };

  const TIPS={tecnica:'Promedio de los golpes: Drive, Revés, Volea y Saque.',tactica:'Construcción del punto.',fisico:'Resistencia y Velocidad.',mental:'Tolerancia al error y Presión.'};

  const catPalette=['#f3fe76','#ff9f43','#ff5d5d','#5eead4','#a78bfa','#ffffff','#86efac'];

  const hexA=(h,a)=>{const n=(h||'').replace('#','');const r=parseInt(n.slice(0,2),16)||0,g=parseInt(n.slice(2,4),16)||0,b=parseInt(n.slice(4,6),16)||0;return 'rgba('+r+','+g+','+b+','+a+')';};
  const catData=cats.map((ct,i)=>{
    const studs=allPlayersList.filter(p=>catOf(p)===ct);
    const dd=areas.map(a=>{ const vals=studs.map(p=>{const s=lastInMonth(p,curMonth); return s?avgLvlKeys(s,AREA_KEYS[a]):0;}).filter(v=>v>0); return vals.length?vals.reduce((x,y)=>x+y,0)/vals.length:0; });
    return {label:ct, data:dd, color:catColorHex(ct,i)};
  });
  el.innerHTML = `<button class="lg-info-btn" onclick="openCoachInfo()" style="margin-bottom:14px;">ℹ️ ¿Qué muestra esta sección?</button>`
    + `<div class="cz-filters">${monthChips}${catChips}</div>`

    + `<div class="cz-bottom">
        <div class="card cz-radar"><div class="card-title">Comparación por categoría${curMonth?' · '+mLabelFull(curMonth):''}</div><div class="chart-wrap" style="height:320px;margin-top:10px;"><canvas id="ch-coach-radar"></canvas></div></div>

// ══════════════════════════════════════
// RESUMEN — pantallazo con filtro por mes
// ══════════════════════════════════════
function monthKey(s){ const d=parseDate(s[COL.fecha])||''; return d?d.slice(0,7):''; }
function ymKey(dateStr){ const d=parseDate(dateStr)||''; return d?d.slice(0,7):''; }
function attendanceFor(name, mk){
  for(const r of asistRows){
    if((r[ASIST.jugador]||'').trim()===(name||'').trim() && ymKey(r[ASIST.fecha])===mk){
      const cum=n(r[ASIST.cumplidas]), obj=n(r[ASIST.objetivo]);
      return {cumplidas:cum, objetivo:obj, pct: obj>0?Math.round(cum/obj*100):0, met: obj>0 && cum>=obj};
    }
  }
  return null;
}
function attMonths(name){ return [...new Set(asistRows.filter(r=>(r[ASIST.jugador]||'').trim()===(name||'').trim()).map(r=>ymKey(r[ASIST.fecha])).filter(Boolean))].sort(); }
function monthLabel(key){
  if(!key) return '';
  const MES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const a=key.split('-'); const nm=MES[Number(a[1])-1]||'';
  return (nm.charAt(0).toUpperCase()+nm.slice(1))+' '+a[0];
}
function areaAvgForSessions(list, areaId){
  const v=list.map(s=>avgLvlKeys(s,AREA_KEYS[areaId])).filter(x=>x>0);
  return v.length? v.reduce((a,b)=>a+b,0)/v.length : 0;
}
function catColor(cat){
  const t=(cat||'').toLowerCase().trim();
  if(t==='b'||t.includes('azul')) return '#5170ff';
  if(t.includes('verde')) return '#22b16c';
  if(t.includes('naranja')) return '#fe972d';
  if(t.includes('roj')) return '#f73b3b';
  return '#6b6f8a';
}
function rebuildAll(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}}); charts={};
  [['resumen',buildResumen],['rubrica',buildRubrica],['plan',buildPlan],['progreso',buildProgreso],['historial',buildHistorial],['liga',buildLiga]].forEach(([id,fn])=>{ try{ fn(); }catch(err){ const ld=document.getElementById('loading-'+id), ct=document.getElementById('content-'+id); if(ld) ld.style.display='none'; if(ct){ ct.style.display='block'; ct.innerHTML='<div class="err-box"><strong>No se pudo construir esta vista.</strong>'+(err&&err.message?err.message:err)+'</div>'; } } });
}
function setMonth(m){ selectedMonth=m; rebuildAll(); }
function filterByMonth(list){ if(selectedMonth==='all') return list; const f=list.filter(s=>monthKey(s)===selectedMonth); return f.length?f:list; }
function monthChipsHTML(){
  const months=[...new Set(playerSessions.map(monthKey).filter(Boolean))].sort();
  const curLbl=selectedMonth==='all'?'Todos':monthLabel(selectedMonth);
  return `<div class="acc filter-acc"><div class="acc-head" onclick="toggleAcc(this)"><span class="acc-title">📅 Filtrar por mes <span class="acc-sub">· ${curLbl}</span></span><span class="acc-chevron">▾</span></div><div class="acc-body"><div class="acc-body-inner"><div class="month-filter">
    <button class="mf-chip ${selectedMonth==='all'?'active':''}" onclick="setMonth('all')">Todos</button>
    ${months.map(m=>`<button class="mf-chip ${selectedMonth===m?'active':''}" onclick="setMonth('${m}')">${monthLabel(m)}</button>`).join('')}
  </div></div></div></div>`;
}

function buildResumen(){
  const el=document.getElementById('content-resumen');
  const ldEl=document.getElementById('loading-resumen');
  const info=getInfo(currentPlayer);
  const sess=playerSessions;

  const catName=info?info[INFO.categoria]:'';
  const catDot=catName?`<span class="cat-dot" style="background:${catColor(catName)};"></span>`:'';
  const fichaHTML=info?`<div class="card">
    <div class="ficha-grid">
      ${info[INFO.brazo]?`<div class="ficha-item"><label>Brazo hábil</label><span>${info[INFO.brazo]}</span></div>`:''}
      ${info[INFO.altura]?`<div class="ficha-item"><label>Altura</label><span>${info[INFO.altura]}</span></div>`:''}
      ${info[INFO.edad]?`<div class="ficha-item"><label>Edad</label><span>${info[INFO.edad]} años</span></div>`:''}
      ${catName?`<div class="ficha-item"><label>Categoría</label><span>${catDot}${catName}</span></div>`:''}
      ${info[INFO.objetivo]?`<div class="ficha-item" style="flex-basis:100%;"><label>Objetivo</label><span style="font-size:13px;font-weight:400;">${info[INFO.objetivo]}</span></div>`:''}
    </div>
  </div>`:'';

  if(!sess.length){
    ldEl.style.display='none'; el.style.display='block';
    el.innerHTML=fichaHTML+'<div class="empty">No hay sesiones registradas.</div>'; return;
  }

  const months=[...new Set(sess.map(monthKey).filter(Boolean))].sort();
  const curMonth=(selectedMonth==='all'||!months.includes(selectedMonth))?months[months.length-1]:selectedMonth;
  const curIdx=months.indexOf(curMonth);
  const prevMonth=curIdx>0?months[curIdx-1]:null;
  const curSess=sess.filter(s=>monthKey(s)===curMonth);
  const prevSess=prevMonth?sess.filter(s=>monthKey(s)===prevMonth):[];
  const prevLbl=prevMonth?monthLabel(prevMonth):'';

  const chips=monthChipsHTML();

  const bench=calcBench(currentPlayer);
  const areas=[{id:'tecnica',nombre:'Técnica'},{id:'tactica',nombre:'Táctica'},{id:'fisico',nombre:'Físico'},{id:'mental',nombre:'Mental'}];
  const TIPS={tecnica:'Promedio de los golpes: Drive, Revés, Volea y Saque.',tactica:'Construcción del punto.',fisico:'Resistencia y Velocidad.',mental:'Tolerancia al error y Presión.'};
  const tipBtn=(t)=>`<span class="mc-info"><button class="mc-info-btn" onclick="toggleTip(this)" aria-label="info">i</button><span class="mc-tip">${t}</span></span>`;
  const curAvgs={}, prevAvgs={};
  areas.forEach(a=>{ curAvgs[a.id]=areaAvgForSessions(curSess,a.id); prevAvgs[a.id]=areaAvgForSessions(prevSess,a.id); });

  const cards=areas.map(a=>{
    const v=curAvgs[a.id], pv=prevAvgs[a.id];
    const d=(prevMonth&&v>0&&pv>0)?(v-pv):null;
    const deltaHTML = d===null ? `<div class="mc-delta flat">—</div>`
      : (d>=0.05?`<div class="mc-delta up">↑ +${d.toFixed(1)} vs ${prevLbl}</div>`
        :d<=-0.05?`<div class="mc-delta down">↓ ${d.toFixed(1)} vs ${prevLbl}</div>`
        :`<div class="mc-delta flat">= vs ${prevLbl}</div>`);
    const cat=bench?(bench['avg_'+a.id]||0):0;
    return `<div class="metric-card">
      <div class="mc-head"><div class="mc-label">${AREA_META[a.id].emoji} ${a.nombre}</div>${tipBtn(TIPS[a.id])}</div>
      <div class="mc-value">${v>0?`${v.toFixed(1)}<span class="mc-max"> / 3</span>`:'—'}</div>
      ${deltaHTML}
      ${cat>0?`<div class="mc-cat">Cat.: ${cat.toFixed(1)}</div>`:''}
    </div>`;
  }).join('');

  const totVals=areas.map(a=>curAvgs[a.id]).filter(v=>v>0);
  const tot=totVals.length?totVals.reduce((x,y)=>x+y,0)/totVals.length:0;
  const totalCard=`<div class="metric-card mc-hl">
    <div class="mc-head"><div class="mc-label">Promedio total</div>${tipBtn('Promedio general de las 4 áreas (Técnica, Táctica, Físico y Mental).')}</div>
    <div class="mc-value">${tot>0?`${tot.toFixed(1)}<span class="mc-max"> / 3</span>`:'—'}</div>
    <div class="mc-cat">${monthLabel(curMonth)} · ${curSess.length} ses.</div>
  </div>`;

  const radarHTML=`<div class="radar-wrap">
    <div class="card-title" style="text-align:center;margin-bottom:6px;color:#fff;">Perfil — ${monthLabel(curMonth)}${prevMonth?` vs ${prevLbl}`:''}</div>
    <div class="chart-wrap" style="height:380px;"><canvas id="ch-radar"></canvas></div>
  </div>`;

  const at=attendanceFor(currentPlayer, curMonth);
  const asistHTML = at ? `<div class="card"><div class="card-title">Asistencia · ${monthLabel(curMonth)}</div><div class="asist-row"><div class="asist-pct ${at.met?'ok':'low'}">${at.pct}%</div><div class="asist-meta"><div class="asist-bar"><div class="asist-fill ${at.met?'ok':'low'}" style="width:${Math.min(100,at.pct)}%;"></div></div><div class="asist-txt">${at.cumplidas} de ${at.objetivo} sesiones del mes${at.met?' · objetivo cumplido 🎾':''}</div></div></div></div>` : '';
  el.innerHTML = fichaHTML + chips + `<div class="metrics-row">${cards}${totalCard}</div>` + asistHTML + radarHTML;
  ldEl.style.display='none'; el.style.display='block';

  if(document.getElementById('ch-radar')){
    const cur=[curAvgs.tecnica,curAvgs.tactica,curAvgs.fisico,curAvgs.mental];
    const prv=[prevAvgs.tecnica,prevAvgs.tactica,prevAvgs.fisico,prevAvgs.mental];
    charts['radar']=new Chart(document.getElementById('ch-radar'),{
      type:'radar',
      data:{labels:['Técnica','Táctica','Físico','Mental'],datasets:[
        ...(prevMonth?[{label:prevLbl,data:prv,borderColor:'rgba(255,255,255,0.7)',backgroundColor:'rgba(255,255,255,0.06)',borderDash:[5,4],borderWidth:1.5,pointRadius:3,pointBackgroundColor:'rgba(255,255,255,0.7)'}]:[]),
        {label:monthLabel(curMonth),data:cur,borderColor:'#f3fe76',backgroundColor:'rgba(243,254,118,0.28)',borderWidth:2,pointRadius:5,pointBackgroundColor:'#f3fe76',pointBorderColor:'#f3fe76'}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'bottom',labels:{color:'#ffffff',font:{size:12},boxWidth:10,padding:14}},
          tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${(c.raw||0).toFixed(1)} / 3`}}},
        scales:{r:{min:0,max:3,ticks:{stepSize:1,backdropColor:'transparent',color:'rgba(255,255,255,0.75)',font:{size:10},callback:v=>['','A trabajar','Funciona','Excelente'][v]||''},grid:{color:'rgba(255,255,255,0.22)'},angleLines:{color:'rgba(255,255,255,0.22)'},pointLabels:{color:'#ffffff',font:{size:13,weight:'700'}}}}
      }
    });
  }
}

function buildRubrica(){
  const el=document.getElementById('content-rubrica');
  const ldEl=document.getElementById('loading-rubrica');
  const sess=playerSessions;
  if(!sess.length){
    ldEl.style.display='none'; el.style.display='block';
    el.innerHTML='<div class="empty">No hay sesiones para mostrar.</div>'; return;
  }
  const fsess=filterByMonth(sess);
  const last=fsess[fsess.length-1];
  const _months=[...new Set(playerSessions.map(monthKey).filter(Boolean))].sort();
  const _curMk=last?monthKey(last):'';
  const _prevMk=_months.indexOf(_curMk)>0?_months[_months.indexOf(_curMk)-1]:null;
  const prevLast=(_prevMk?playerSessions.filter(s=>monthKey(s)===_prevMk):[]).slice(-1)[0]||null;
  const bench=calcBench(currentPlayer);
  const info=getInfo(currentPlayer);
  const catName=info?info[INFO.categoria]:'';
  const areas=[{id:'tecnica',nombre:'Técnica'},{id:'tactica',nombre:'Táctica'},{id:'fisico',nombre:'Físico'},{id:'mental',nombre:'Mental'}];
  const balls=(lv)=>[1,2,3].map(i=>`<span class="thumb ${i<=lv?'on':'off'}">👍</span>`).join('');
  const PERF_Q={'Construcción del punto':'¿Construye variando sus golpes?','Lectura del rival':'¿Ajusta su juego?','Gestión del marcador':'¿Sabe cuándo arriesgar?','Resistencia':'¿Se cansa rápido?','Velocidad':'¿Llega con equilibrio y tiempo?','Agilidad':'¿Recupera posición rápido?','Fuerza':'¿Juega profundo bajo cansancio?','Tolerancia al error':'¿Resetea entre puntos?','Presión':'¿Sube nivel en punto clave?','Comunicación':'¿Postura activa y positiva?','Concentración':'¿Se mantiene presente?'};
  const cards=areas.map(a=>{
    const grupos=RESUMEN_GROUPS[a.id];
    const rows=grupos.map(g=>{
      const arr=g.keys.map(k=>toLvl(last[COL[k]])).filter(v=>v>0);
      if(!arr.length) return '';
      const p=arr.reduce((x,y)=>x+y,0)/arr.length;
      const lv=Math.round(p);
      let prevLv=0; if(prevLast){ const pa=g.keys.map(k=>toLvl(prevLast[COL[k]])).filter(v=>v>0); if(pa.length) prevLv=Math.round(pa.reduce((x,y)=>x+y,0)/pa.length); }
      const rise = prevLv>0 && lv>prevLv;
      const q=PERF_Q[g.nombre]||'';
      return `<div class="ball-item">
        <div class="ball-row">
          <span class="ball-name">${g.nombre}</span>
          <span class="balls">${balls(lv)}</span>
          <span class="ball-label lb${lv}">${lvlLabel(lv)}</span>
        </div>
        ${q?`<div class="ball-q">${q}</div>`:''}
        ${rise?`<div class="rise-tag">🔥 ¡Subiste de nivel!</div>`:''}
      </div>`;
    }).filter(Boolean).join('');
    if(!rows) return '';
    return `<div class="perf-card"><div class="perf-card-title">${AREA_META[a.id].emoji} ${a.nombre}</div>${rows}</div>`;
  }).join('');
  const legend=`<div class="nota">El rendimiento se mide en <strong>3 niveles</strong> — sumá pulgares 👍 a medida que mejorás:</div>
    <div class="sem-legend" style="margin-bottom:14px;">
      <span class="sem-leg" style="background:var(--n1);color:#161616;">👍 A trabajar</span>
      <span class="sem-leg" style="background:var(--n2);color:#161616;">👍👍 Funciona</span>
      <span class="sem-leg" style="background:var(--n3);color:#161616;">👍👍👍 Excelente</span>
    </div>`;
  el.innerHTML = monthChipsHTML() + legend + `<div class="perf-grid">${cards}</div>`;
  ldEl.style.display='none'; el.style.display='block';
}

// PLAN DE ACCIÓN — objetivo, observación y focos (acordeón + checklist)
// ══════════════════════════════════════
function prioStore(){ try{ return JSON.parse(localStorage.getItem('mitenis_prio')||'{}'); }catch(e){ return {}; } }
function isPrio(player,key){ const s=prioStore(); return !!(s[player] && s[player].indexOf(key)>=0); }
function togglePrio(player,key,el){
  const s=prioStore(); s[player]=s[player]||[];
  const i=s[player].indexOf(key);
  if(el.checked){ if(i<0) s[player].push(key); } else { if(i>=0) s[player].splice(i,1); }
  try{ localStorage.setItem('mitenis_prio', JSON.stringify(s)); }catch(e){}
  const row=el.closest('.prio-row'); if(row) row.classList.toggle('is-prio', el.checked);
}
function buildPlan(){
  const el=document.getElementById('content-plan');
  const ldEl=document.getElementById('loading-plan');
  const sess=playerSessions;
  if(!sess.length){
    ldEl.style.display='none'; el.style.display='block';
    el.innerHTML='<div class="empty">No hay sesiones para generar el plan.</div>'; return;
  }
  const fsess=filterByMonth(sess);
  const last=fsess[fsess.length-1];
  const info=getInfo(currentPlayer);
  const items=[];
  Object.keys(RUBRICAS).forEach(areaId=>{
    RUBRICAS[areaId].forEach(v=>{
      const lv=toLvl(last[COL[v.key]]);
      if(lv>0) items.push({key:v.key, area:AREA_META[areaId].nombre, emoji:AREA_META[areaId].emoji, nombre:v.nombre, lv});
    });
  });
  const g1=items.filter(i=>i.lv===1), g2=items.filter(i=>i.lv===2), g3=items.filter(i=>i.lv===3);
  const objetivoHTML = (info && info[INFO.objetivo])
    ? `<div class="card"><div class="card-title">🎯 Objetivo</div><div class="feedback-block feedback-coach">${info[INFO.objetivo]}</div></div>` : '';
  const obs=last[COL.obs_profe];
  const obsHTML = `<div class="card"><div class="card-title">Observación del profe · ${fmtDate(last[COL.fecha])}</div><div class="feedback-block feedback-coach">${obs?obs:'Sin observación registrada en la última sesión.'}</div></div>`;
  const legend=`<div class="sem-legend" style="margin-bottom:14px;">
    <span class="sem-leg" style="background:var(--n1);color:#161616;">A trabajar</span>
    <span class="sem-leg" style="background:var(--n2);color:#161616;">En progreso</span>
  </div>`;
  const pl=currentPlayer.replace(/'/g,"\\'");
  const planAcc=(titulo,arr,dotc,lvc,open)=>{
    if(!arr.length) return '';
    const rows=arr.map(it=>{
      const ck=isPrio(currentPlayer,it.key)?' checked':'';
      return `<label class="prio-row ${lvc}${ck?' is-prio':''}">
        <input type="checkbox" class="prio-check" onchange="togglePrio('${pl}','${it.key}',this)"${ck}>
        <span class="prio-name">${it.nombre}</span>
        <span class="prio-area">${it.emoji} ${it.area}</span>
      </label>`;
    }).join('');
    return `<div class="acc${open?' open':''}">
      <div class="acc-head" onclick="toggleAcc(this)">
        <span class="acc-title"><span class="dot ${dotc}"></span> ${titulo} <span style="color:var(--hint);font-weight:500;">(${arr.length})</span></span>
        <span class="acc-chevron">▾</span>
      </div>
      <div class="acc-body"><div class="acc-body-inner">${rows}</div></div>
    </div>`;
  };
  let fort='';
  if(g3.length) fort=`<div class="plan-group-title"><span class="dot dot-3"></span> Fortalezas (${g3.length})</div><div class="plan-armas-wrap">`+g3.map(it=>`<span class="plan-arma">${it.emoji} ${it.nombre}</span>`).join('')+`</div>`;
  el.innerHTML = monthChipsHTML() + obsHTML
    + `<div class="nota">Marcá con el casillero las variables que vas a priorizar en las próximas semanas.</div>`
    + legend
    + planAcc('A trabajar', g1,'dot-1','lv1',true)
    + planAcc('En progreso', g2,'dot-2','lv2',true);
  ldEl.style.display='none'; el.style.display='block';
}

function buildHistorial(){
  const el=document.getElementById('content-historial');
  const ldEl=document.getElementById('loading-historial');
  const sess=[...filterByMonth(playerSessions)].reverse();
  if(!sess.length){
    ldEl.style.display='none'; el.style.display='block';
    el.innerHTML=monthChipsHTML()+'<div class="empty">No hay sesiones registradas.</div>'; return;
  }
  el.innerHTML=monthChipsHTML()+`<div class="card">
    <div class="card-title">${sess.length} sesión${sess.length!==1?'es':''} registradas</div>
    ${sess.map(s=>{
      const tipo=s[COL.tipo]||'';
      const tLvl=Math.round(avgLvlKeys(s,AREA_KEYS.tecnica));
      const tacLvl=Math.round(avgLvlKeys(s,AREA_KEYS.tactica));
      const fLvl=Math.round(avgLvlKeys(s,AREA_KEYS.fisico));
      const mLvl=Math.round(avgLvlKeys(s,AREA_KEYS.mental));
      const t=tipo.toLowerCase();
      const dot=t.includes('torneo')?'var(--lv1)':t.includes('partido')?'var(--lv2)':t.includes('físic')||t.includes('fisic')?'var(--fis)':t.includes('mental')?'var(--men)':'var(--tec)';
      return `<div class="session-item">
        <div class="session-dot" style="background:${dot};margin-top:6px;"></div>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
            <span class="ctx-badge ${ctxClass(tipo)}">${ctxLabel(tipo)}</span>
            <span class="session-date">${fmtDate(s[COL.fecha])}</span>
          </div>
          ${s[COL.descripcion]?`<div style="font-size:12px;color:var(--muted);margin-bottom:4px;">${s[COL.descripcion]}</div>`:''}
          <div class="session-pills">
            ${tLvl?`<span class="session-pill pill-tec">Téc: ${lvlLabel(tLvl)}</span>`:''}
            ${tacLvl?`<span class="session-pill pill-tac">Tác: ${lvlLabel(tacLvl)}</span>`:''}
            ${fLvl?`<span class="session-pill pill-fis">Fís: ${lvlLabel(fLvl)}</span>`:''}
            ${mLvl?`<span class="session-pill pill-men">Men: ${lvlLabel(mLvl)}</span>`:''}
          </div>
          ${s[COL.obs_profe]?`<div class="hist-obs-h">Observación del Profe</div><div class="feedback-block feedback-coach">${s[COL.obs_profe]}</div>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
  ldEl.style.display='none'; el.style.display='block';
}

// ══════════════════════════════════════
// LIGA — puntaje: asistencia + excelencia por área
// +5 asistencia cumplida · +4 táctica · +3 mental · +2 técnica · +1 físico (cada área en nivel Excelente)
// ══════════════════════════════════════
const LG = { ATTEND:5, EXC:{tactica:4, mental:3, tecnica:2, fisico:1} };
function sessionsOf(name){
  return allRows.filter(r=>r[COL.alumno]===name)
    .sort((a,b)=>new Date(parseDate(a[COL.fecha]))-new Date(parseDate(b[COL.fecha])));
}
function areaAvgScope(name, period, areaId){
  const ss=sessionsOf(name).filter(s=> period==='all'?true:monthKey(s)===period);
  const vals=ss.map(s=>avgLvlKeys(s,AREA_KEYS[areaId])).filter(v=>v>0);
  return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
}
function scorePlayer(name, period){
  const sessScope=sessionsOf(name).filter(s=> period==='all'?true:monthKey(s)===period);
  const aMonths = period==='all' ? attMonths(name) : [period];
  let asistencia=0;
  aMonths.forEach(mk=>{ const at=attendanceFor(name,mk); if(at && at.met) asistencia+=LG.ATTEND; });
  // Excelencia por área: el área cuenta si su promedio (redondeado) llega a nivel Excelente (3)
  const exc={};
  let excelencia=0;
  Object.keys(LG.EXC).forEach(areaId=>{
    const isExc = Math.round(areaAvgScope(name,period,areaId))===3;
    const pts = isExc ? LG.EXC[areaId] : 0;
    exc[areaId]=pts;
    excelencia+=pts;
  });
  return {name, asistencia, exc, excelencia, sesiones:sessScope.length, total:asistencia+excelencia};
}
function areaTier(name, areaId){
  const sess=sessionsOf(name);
  const last={};
  sess.forEach(s=>AREA_KEYS[areaId].forEach(k=>{const lv=toLvl(s[COL[k]]); if(lv>0) last[k]=lv;}));
  const vals=Object.values(last);
  if(!vals.length) return {avg:0, tier:0};
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  return {avg, tier: avg>=2.6?3 : avg>=2.0?2 : avg>=1.4?1 : 0};
}
const TIER_MEDAL={3:{ic:'🥇',name:'Oro'},2:{ic:'🥈',name:'Plata'},1:{ic:'🥉',name:'Bronce'},0:{ic:'⚪',name:'Sin medalla aún'}};

function buildLiga(){
  const el=document.getElementById('content-liga');
  const ldEl=document.getElementById('loading-liga');
  const allPlayers=[...new Set(allRows.map(r=>r[COL.alumno]))].filter(Boolean);
  if(!allPlayers.length){
    ldEl.style.display='none'; el.style.display='block';
    el.innerHTML=monthChipsHTML()+'<div class="empty">Todavía no hay datos para armar la liga.</div>'; return;
  }
  const period=selectedMonth;
  const periodLbl = period==='all' ? 'General · todos los meses' : monthLabel(period);
  const avatarOf=name=>avatarColor(name);
  const iniOf=name=>name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  let board=allPlayers.map(p=>scorePlayer(p, period)).filter(s=>s.sesiones>0);
  board.sort((a,b)=> b.total-a.total || b.excelencia-a.excelencia || b.asistencia-a.asistencia);

  const explain=`<button class="lg-info-btn" onclick="openLigaInfo()">ℹ️ ¿Cómo funciona la Liga?</button>`;

  const meScore=board.find(s=>s.name===currentPlayer);
  let meHTML;
  if(meScore){
    const rank=board.findIndex(s=>s.name===currentPlayer)+1;
    meHTML=`<div class="lg-me">
      <div class="lg-me-top">
        <div><div class="lg-me-lbl">Mi puntaje · ${periodLbl}</div><div class="lg-me-rank">${rank}º de ${board.length} · ${meScore.sesiones} ses.</div></div>
        <div class="lg-me-score"><div class="lg-me-pts">${meScore.total}<span> pts</span></div></div>
      </div>
      <div class="lg-break lg-break-5">
        <div class="lg-bk"><div class="lg-bk-ico">📅</div><div class="lg-bk-val">${meScore.asistencia}</div><div class="lg-bk-lbl">Asist.</div></div>
        <div class="lg-bk"><div class="lg-bk-ico">♟️</div><div class="lg-bk-val">${meScore.exc.tactica}</div><div class="lg-bk-lbl">Táctica</div></div>
        <div class="lg-bk"><div class="lg-bk-ico">🧠</div><div class="lg-bk-val">${meScore.exc.mental}</div><div class="lg-bk-lbl">Mental</div></div>
        <div class="lg-bk"><div class="lg-bk-ico">🎾</div><div class="lg-bk-val">${meScore.exc.tecnica}</div><div class="lg-bk-lbl">Técnica</div></div>
        <div class="lg-bk"><div class="lg-bk-ico">⚡</div><div class="lg-bk-val">${meScore.exc.fisico}</div><div class="lg-bk-lbl">Físico</div></div>
      </div>
    </div>`;
  } else {
    meHTML=`<div class="nota">No tenés sesiones en <strong>${periodLbl}</strong>. Sumá asistencia para entrar a la tabla.</div>`;
  }

  let podiumHTML='';
  if(board.length>=2){
    const order=[1,0,2], cls={0:'p1',1:'p2',2:'p3'}, medal={0:'🥇',1:'🥈',2:'🥉'};
    podiumHTML='<div class="lg-podium">'+order.filter(i=>board[i]).map(i=>{
      const s=board[i];
      return `<div class="lg-pod ${cls[i]}">
        <div class="lg-pod-av" style="background:${avatarOf(s.name)};">${iniOf(s.name)}</div>
        <div class="lg-pod-name">${s.name.split(' ')[0]}</div>
        <div class="lg-pod-pts">${s.total} pts</div>
        <div class="lg-pod-stand">${medal[i]}</div>
      </div>`;
    }).join('')+'</div>';
  }

  const rowsHTML=board.map((s,i)=>{
    return `<div class="lg-row ${s.name===currentPlayer?'me':''}">
      <div class="lg-rank ${i<3?'top':''}">${i+1}</div>
      <div class="lg-av" style="background:${avatarOf(s.name)};">${iniOf(s.name)}</div>
      <div class="lg-info">
        <div class="lg-name">${s.name}</div>
        <div class="lg-sub">📅 ${s.asistencia} · ⭐ ${s.excelencia} excelencia</div>
      </div>
      <div class="lg-pts">${s.total}<span> pts</span></div>
    </div>`;
  }).join('');

  const areas=[['tecnica','Técnica'],['tactica','Táctica'],['fisico','Físico'],['mental','Mental']];
  const medalsHTML=areas.map(([id,nombre])=>{
    const t=areaTier(currentPlayer,id), m=TIER_MEDAL[t.tier];
    return `<div class="lg-medal ${t.tier===0?'none':''}">
      <div class="lg-medal-ic">${m.ic}</div>
      <div class="lg-medal-tx">
        <div class="lg-medal-area">${AREA_META[id].emoji} ${nombre}</div>
        <div class="lg-medal-tier">${m.name}${t.avg?` · ${lvlLabel(Math.round(t.avg))}`:''}</div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = monthChipsHTML() + explain + meHTML
    + (podiumHTML?`<div class="card"><div class="card-title">Podio · ${periodLbl}</div>${podiumHTML}</div>`:'')
    + `<div class="card"><div class="card-title">Tabla de posiciones</div>${rowsHTML||'<div class="empty" style="color:var(--muted);">Sin jugadores en este período.</div>'}</div>`;
  ldEl.style.display='none'; el.style.display='block';
}

init();
</script>
